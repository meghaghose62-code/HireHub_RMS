<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HireHub - Manage Users</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Poppins, sans-serif;
}

body {
  background: #f5f6fa;
}

.navbar {
  background: #0a66c2;
  padding: 15px 30px;
  color: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.navbar h2 {
  font-size: 22px;
}

.navbar button {
  background: white;
  color: #0a66c2;
  border: none;
  padding: 8px 16px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
}

.content {
  padding: 30px;
  width: 100%;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 8px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}

h3 {
  color: #0a66c2;
  margin-bottom: 15px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 12px;
  border: 1px solid #ddd;
  text-align: left;
}

th {
  background: #f1f7ff;
  color: #0a66c2;
}

button.action-btn {
  padding: 6px 12px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  color: white;
  background: #0a66c2;
  margin-right: 5px;
}

button.deactivate-btn {
  background: #e74c3c;
}

@media (max-width:768px) {
  table, th, td {
    font-size: 14px;
  }
}
</style>

</head>
<body>

<div class="navbar">
  <h2>HireHub Admin - Manage Users</h2>
  <button onclick="location.href='admin-dashboard.html'">⬅ Back to Dashboard</button>
</div>

<div class="content">
  <div class="card">
    <h3>Manage Users</h3>
    <table>
      <tr>
        <th>User ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Role</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>

      <tr>
        <td>U101</td>
        <td class="name">Megha Ghosh</td>
        <td>megha@gmail.com</td>
        <td>Candidate</td>
        <td class="status">Active</td>
        <td>
          <button class="action-btn" onclick="editUser(this)">Edit</button>
          <button class="action-btn deactivate-btn" onclick="deactivateUser(this)">Deactivate</button>
        </td>
      </tr>

      <tr>
        <td>U102</td>
        <td class="name">Rohan Sharma</td>
        <td>rohan@tech.com</td>
        <td>HR / Recruiter</td>
        <td class="status">Active</td>
        <td>
          <button class="action-btn" onclick="editUser(this)">Edit</button>
          <button class="action-btn deactivate-btn" onclick="deactivateUser(this)">Deactivate</button>
        </td>
      </tr>

      <tr>
        <td>U103</td>
        <td class="name">Admin User</td>
        <td>admin@hirehub.com</td>
        <td>Admin</td>
        <td class="status">Active</td>
        <td>
          <button class="action-btn" onclick="editUser(this)">Edit</button>
          <button class="action-btn deactivate-btn" onclick="deactivateUser(this)">Deactivate</button>
        </td>
      </tr>

    </table>
  </div>
</div>

<script>
function editUser(btn) {
  let row = btn.parentElement.parentElement;
  let nameCell = row.querySelector(".name");
  let currentName = nameCell.innerText;

  let newName = prompt("Edit Username:", currentName);
  if (newName !== null && newName.trim() !== "") {
    nameCell.innerText = newName;
    alert("Name updated successfully ✅");
  }
}

function deactivateUser(btn) {
  let row = btn.parentElement.parentElement;
  let statusCell = row.querySelector(".status");

  if (confirm("Are you sure you want to deactivate this user?")) {
    statusCell.innerText = "Inactive";
    statusCell.style.color = "red";
    alert("User deactivated ❌");
  }
}
</script>

</body>
</html>
