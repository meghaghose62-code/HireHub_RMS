<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HireHub - Post Job</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:Poppins,sans-serif; }
    body { background:#f5f6fa; }
    .navbar { background:#0a66c2; padding:15px 30px; color:white; display:flex; justify-content:space-between; align-items:center; }
    .navbar h2 { font-size:22px; }
    .navbar button { background:white; color:#0a66c2; border:none; padding:8px 16px; border-radius:6px; cursor:pointer; font-weight:600; }

    .container { padding:25px; }
    .card { background:white; padding:20px; border-radius:8px; box-shadow:0 1px 4px rgba(0,0,0,0.1); max-width:500px; margin:auto; }
    h3 { color:#0a66c2; margin-bottom:10px; }
    input, textarea, select { width:100%; padding:10px; margin:10px 0; border-radius:6px; border:1px solid #ccc; font-size:15px; }
    button { padding:10px 20px; background:#0a66c2; color:white; border:none; border-radius:6px; cursor:pointer; font-weight:600; margin-top:10px; }
    button:hover { background:#084d94; }
    label { font-weight:500; }
</style>
</head>
<body>

<div class="navbar">
    <h2>HireHub - Post New Job</h2>
    <button onclick="location.href='recruiter-dashboard.html'">Back</button>
</div>

<div class="container">
    <div class="card">
        <h3>Post a New Job</h3>
        <form onsubmit="event.preventDefault(); window.location.href='job-post-success.html';">
            <label>Job Title</label>
            <input type="text" placeholder="Frontend Developer" required>

            <label>Company Name</label>
            <input type="text" placeholder="Tech Solutions" required>

            <label>Location</label>
            <input type="text" placeholder="City or Remote" required>

            <label>Experience Required (years)</label>
            <input type="number" placeholder="e.g. 2" min="0" required>

            <label>Salary (₹)</label>
            <input type="number" min="0" step="10000" value="600000" required>

            <label>Skills Required</label>
            <input type="text" placeholder="React, JavaScript, Tailwind CSS" required>

            <label>Job Description</label>
            <textarea rows="4" placeholder="Describe job responsibilities..." required></textarea>

            <label>Application Deadline</label>
            <input type="date" required>

            <button type="submit">Post Job</button>
        </form>
    </div>
</div>

</body>
</html>
