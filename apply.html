<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HireHub - Apply for Job</title>
<style>
    * { margin:0; padding:0; font-family:Poppins,sans-serif; box-sizing:border-box; }
    body { background:#f5f6fa; }

    .navbar {
        background:#0a66c2;
        padding:15px 30px;
        color:white;
        display:flex;
        justify-content:space-between;
        align-items:center;
    }
    .navbar h2 { font-size:22px; }

    .container {
        max-width:600px;
        background:white;
        margin:30px auto;
        padding:25px;
        border-radius:8px;
        box-shadow:0 1px 4px rgba(0,0,0,0.1);
    }

    .container h3 { text-align:center; color:#0a66c2; margin-bottom:15px; }

    label { font-weight:600; display:block; margin-top:12px; }
    input, textarea {
        width:100%;
        padding:10px;
        margin-top:6px;
        border:1px solid #ccc;
        border-radius:6px;
    }
    textarea { resize:none; height:80px; }

    button {
        width:100%;
        background:#0a66c2;
        border:none;
        color:white;
        padding:12px;
        border-radius:6px;
        margin-top:18px;
        font-size:16px;
        cursor:pointer;
    }
    button:hover { background:#084d94; }
</style>
</head>
<body>

<div class="navbar">
    <h2>Apply for Job</h2>
</div>

<div class="container">
    <h3>Submit Your Application</h3>

    <label>Full Name</label>
    <input type="text" placeholder="Enter your name">

    <label>Email</label>
    <input type="email" placeholder="Enter your email">

    <label>Phone Number</label>
    <input type="text" placeholder="Enter phone number">

    <label>Upload Resume</label>
    <input type="file">

    <label>Cover Letter</label>
    <textarea placeholder="Write a short cover letter..."></textarea>

    <!-- ✅ Fixed Button Link -->
    <button onclick="location.href='success.html'">Submit Application</button>
</div>

</body>
</html>
