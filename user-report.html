<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Report</title>

<style>
 * { margin:0; padding:0; box-sizing:border-box; font-family:Poppins, sans-serif; }
 body { background:#f5f6fa; display:flex; flex-direction:column; height:100vh; }

 .navbar {
     background:#0a66c2;
     padding:15px 30px;
     color:white;
     display:flex;
     justify-content:space-between;
     align-items:center;
     box-shadow:0 2px 6px rgba(0,0,0,0.15);
 }
 .navbar h2 { font-size:22px; }
 .navbar button {
     background:white;
     color:#0a66c2;
     border:none;
     padding:8px 16px;
     border-radius:6px;
     cursor:pointer;
     font-weight:600;
     transition:0.2s;
 }
 .navbar button:hover { background:#e8f0ff; }

 .content { flex:1; padding:30px; }

 .report-box {
     background:white;
     padding:22px;
     border-radius:10px;
     box-shadow:0 2px 8px rgba(0,0,0,0.1);
     height:100%;
 }

 table { width:100%; border-collapse:collapse; margin-top:15px; }
 table, th, td { border:1px solid #ddd; }
 th, td { padding:12px; text-align:left; }
 th { background:#0a66c2; color:white; }
</style>
</head>

<body>

<div class="navbar">
    <h2>👤 User Report</h2>
    <button onclick="location.href='admin-dashboard.html'">⬅ Back to dashboard</button>
</div>

<div class="content">
  <div class="report-box">
    <h3>Registered Users</h3>

    <table>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Role</th>
        <th>Joined</th>
      </tr>
      <tr><td>1</td><td>Megha Ghosh</td><td>Admin</td><td>2024-04-12</td></tr>
      <tr><td>2</td><td>Amit Sharma</td><td>HR</td><td>2024-05-20</td></tr>
      <tr><td>3</td><td>Riya Das</td><td>User</td><td>2024-07-02</td></tr>
      <tr><td>4</td><td>Karan Roy</td><td>User</td><td>2024-08-14</td></tr>
    </table>

  </div>
</div>

</body>
</html>
