<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HireHub - Admin Dashboard</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Poppins,sans-serif; }

/* Background image */
body {
    background: url('https://www.oleeo.com/wp-content/uploads/2024/07/Protecting-Candidate-Data.-Oleeos-Top-tips-to-Security-Compliance-and-Trust-1-1024x683.jpg') no-repeat center center/cover;
    height: 100vh;
    color: white;
    display: flex;
    flex-direction: column;
}

/* Navbar */
.navbar {
    background: rgba(10, 102, 194, 0.9);
    padding:15px 30px;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 6px rgba(0,0,0,0.2);
}
.navbar h2 { font-size:24px; }
.navbar button {
    background:white;
    color:#0a66c2;
    border:none;
    padding:8px 16px;
    border-radius:6px;
    cursor:pointer;
    font-weight:600;
    transition:0.3s ease;
}
.navbar button:hover { background:#eaf2ff; }

/* Layout */
.container {
    display: grid;
    grid-template-columns: 250px 1fr;
    height: calc(100vh - 60px);
}

/* Sidebar */
.sidebar {
    background: rgba(255,255,255,0.95);
    padding:20px;
    border-right:1px solid #ddd;
    box-shadow:2px 0 8px rgba(0,0,0,0.05);
}
.sidebar h3 { 
    margin-bottom:20px; 
    color:#0a66c2; 
    font-size:18px; 
    text-transform:uppercase;
}
.sidebar a {
    display:block;
    padding:12px;
    color:#0a66c2;
    text-decoration:none;
    margin-bottom:10px;
    border-radius:6px;
    background:#f1f7ff;
    font-weight:500;
    transition:all 0.3s ease;
}
.sidebar a:hover {
    background:#dbe9ff;
    transform:translateX(5px);
}

/* Main Content Centered */
.content {
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:40px;
}

/* ✨ Text Box (Square Under Text) */
.text-box {
    background: rgba(0, 0, 0, 0.6);
    border-radius: 20px;
    padding: 50px 70px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    backdrop-filter: blur(8px);
    max-width: 800px;
}

/* Headings & Text */
.text-box h1 {
    font-size:52px;
    margin-bottom:20px;
    font-weight:700;
    text-shadow:2px 2px 10px rgba(0,0,0,0.5);
}
.text-box p {
    font-size:20px;
    line-height:1.6;
    margin-bottom:40px;
}

/* Stats Section */
.stats {
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:50px;
}
.stats div { text-align:center; }
.stats h3 {
    font-size:40px;
    margin-bottom:10px;
    color:#fff;
    text-shadow:1px 1px 8px rgba(0,0,0,0.4);
}
.stats p { font-size:18px; color:#f0f0f0; }

/* Responsive */
@media(max-width:768px){
    .container { grid-template-columns: 1fr; }
    .text-box { padding:30px 20px; }
    .text-box h1 { font-size:36px; }
    .text-box p { font-size:16px; }
}
</style>
</head>
<body>

<div class="navbar">
    <h2>HireHub Admin Dashboard</h2>
    <button onclick="location.href='login.html'">Logout</button>
</div>

<div class="container">
    <div class="sidebar">
        <h3>Admin Menu</h3>
        <a href="job-approval.html">✔ Approve Job Posts</a>
        <a href="report-analysis.html">📈 Reports & Analytics</a>
        <a href="manage-users.html">👥 Manage Users</a>
        <a href="system-alerts.html">⚠ System Alerts</a>
    </div>

    <div class="content">
        <div class="text-box">
            <h1>Hello, Admin! 👋</h1>
            <p>Empower your hiring journey with insights, control, and effortless management — all in one place at HireHub.</p>

            <div class="stats">
                <div>
                    <h3>320</h3>
                    <p>Active Users</p>
                </div>
                <div>
                    <h3>120</h3>
                    <p>Job Listings</p>
                </div>
                <div>
                    <h3>450</h3>
                    <p>Applications</p>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
