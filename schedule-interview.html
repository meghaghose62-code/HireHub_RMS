<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HireHub - Schedule Interview</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:Poppins,sans-serif; }
    body { background:#f5f6fa; }
    .navbar { background:#0a66c2; padding:15px 30px; color:white; display:flex; justify-content:space-between; align-items:center; }
    .navbar h2 { font-size:22px; }
    .navbar button { background:white; color:#0a66c2; border:none; padding:8px 16px; border-radius:6px; cursor:pointer; font-weight:600; }

    .container { padding:25px; }
    .card { background:white; padding:20px; border-radius:8px; box-shadow:0 1px 4px rgba(0,0,0,0.1); max-width:500px; margin:auto; }
    h3 { color:#0a66c2; margin-bottom:10px; }
    input, select { width:100%; padding:10px; margin:10px 0; border-radius:6px; border:1px solid #ccc; }
    button { padding:10px 20px; background:#0a66c2; color:white; border:none; border-radius:6px; cursor:pointer; font-weight:600; margin-top:10px; }
</style>
</head>
<body>

<div class="navbar">
    <h2>HireHub - Schedule Interview</h2>
    <button onclick="location.href='view-application.html'">Back</button>
</div>

<div class="container">
    <div class="card">
        <h3>Schedule Interview for John Doe</h3>

        <form onsubmit="goSuccess(event)">
            <label>Job Position</label>
            <select required>
                <option>Frontend Developer</option>
                <option>Backend Engineer</option>
                <option>Full Stack Developer</option>
            </select>

            <label>Date</label>
            <input type="date" required>

            <label>Time</label>
            <input type="time" required>

            <label>Mode</label>
            <select required>
                <option>Online</option>
                <option>Offline</option>
            </select>

            <button type="submit">Schedule Interview</button>
        </form>
    </div>
</div>

<script>
function goSuccess(event) {
    event.preventDefault();
    window.location.href = "interview-success.html";
}
</script>

</body>
</html>
