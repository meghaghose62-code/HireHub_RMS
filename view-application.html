<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HireHub - View Application</title>

<style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:Poppins,sans-serif; }
    body { background:#f5f6fa; }

    .navbar {
        background:#0a66c2;
        padding:15px 30px;
        color:white;
        display:flex;
        justify-content:space-between;
        align-items:center;
    }
    .navbar h2 { font-size:22px; }
    .navbar button {
        background:white; 
        color:#0a66c2; 
        border:none;
        padding:8px 16px; 
        border-radius:6px; 
        cursor:pointer; 
        font-weight:600;
    }

    .container {
        max-width:900px;
        margin:20px auto;
        background:white;
        border-radius:8px;
        box-shadow:0 1px 6px rgba(0,0,0,0.1);
        padding:20px;
    }

    h3 { 
        color:#0a66c2; 
        margin-bottom:15px; 
        font-size:22px;
    }

    .candidate-info { 
        display:grid; 
        grid-template-columns:1fr 1fr; 
        gap:15px; 
    }
    .candidate-info div { margin-bottom:10px; }
    .candidate-info label { 
        font-weight:600; 
        display:block; 
        margin-bottom:5px; 
        color:#333; 
    }
    .candidate-info p { color:#555; }

    /* View Resume button */
    .resume-btn {
        background:#0a66c2;
        color:white;
        padding:10px 20px;
        border:none;
        border-radius:6px;
        cursor:pointer;
        font-weight:600;
        font-size:15px;
        display:inline-block;
        margin-top:5px;
        text-align:center;
        transition:0.3s;
    }
    .resume-btn:hover {
        background:#084a96;
    }

    /* Buttons */
    .buttons { margin-top:20px; }
    .buttons button {
        padding:10px 18px;
        border:none;
        border-radius:6px;
        cursor:pointer;
        color:white;
        font-weight:600;
        margin-right:10px;
    }
    .buttons .shortlist { background:#27ae60; }
    .buttons .shortlist:hover { background:#1e8449; }
    .buttons .reject { background:#e74c3c; }
    .buttons .reject:hover { background:#c0392b; }

    @media(max-width:600px){
        .candidate-info { grid-template-columns:1fr; }
    }
</style>

</head>
<body>

<div class="navbar">
    <h2>HireHub - Candidate Application</h2>
    <button onclick="window.location.href='recruiter-dashboard.html'">Back to Dashboard</button>
</div>

<div class="container">
    <h3>Candidate Details</h3>

    <div class="candidate-info">

        <div>
            <label>Name</label>
            <p>Rishi Ghosh</p>
        </div>

        <div>
            <label>Email</label>
            <p>rishighosh123@gmail.com</p>
        </div>

        <div>
            <label>Phone</label>
            <p>+91 9876543210</p>
        </div>

        <div>
            <label>Applied For</label>
            <p>Frontend Developer</p>
        </div>

        <div>
            <label>Experience</label>
            <p>2 years</p>
        </div>

        <div>
            <label>Skills</label>
            <p>HTML, CSS, JavaScript, React</p>
        </div>

    
        <div>
            <label>Resume</label>
           
                View Resume
            </button>
        </div>

        <div>
            <label>Application Status</label>
            <p>Applied</p>
        </div>

    </div>

    <div class="buttons">
        <button class="shortlist" onclick="window.location.href='schedule-interview.html'">Shortlist & Schedule Interview</button>
        <button class="reject" onclick="alert('Candidate has been rejected'); window.location.href='recruiter-dashboard.html'">Reject</button>
    </div>
</div>

</body>
</html>
