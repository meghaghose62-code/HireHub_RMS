<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HireHub - Saved Jobs</title>
<style>
    * { margin:0; padding:0; font-family:Poppins,sans-serif; box-sizing:border-box; }
    body { background:#f5f6fa; }

    .navbar {
        background:#0a66c2;
        padding:15px 30px;
        color:white;
        display:flex;
        justify-content:space-between;
        align-items:center;
    }
    .navbar button {
        background:white; color:#0a66c2; border:none;
        padding:8px 16px; border-radius:6px; cursor:pointer; font-weight:600;
    }

    .container {
        padding:25px;
    }

    .job-card {
        background:white;
        padding:20px;
        border-radius:8px;
        box-shadow:0 1px 4px rgba(0,0,0,0.1);
        margin-bottom:20px;
        border-left:5px solid #0a66c2;
    }
    .job-card h3 { color:#0a66c2; }
    .job-card p { margin:6px 0; color:#444; }

    .job-card .btn-group {
        margin-top:10px;
    }

    .job-card button {
        border:none;
        padding:8px 14px;
        border-radius:6px;
        cursor:pointer;
        margin-right:8px;
    }

    .apply-btn {
        background:#0a66c2;
        color:white;
    }
    .apply-btn:hover { background:#084d94; }

    .remove-btn {
        background:#ff4d4d;
        color:white;
    }
    .remove-btn:hover { background:#d93636; }
</style>
</head>
<body>

<div class="navbar">
    <h2>Saved Jobs</h2>
    <button onclick="location.href='dashboard.html'">Dashboard</button>
</div>

<div class="container">

    <div class="job-card">
        <h3>Frontend Developer</h3>
        <p>📍 Remote | 💼 2+ years</p>
        <p>🛠 Skills: React, JavaScript, CSS</p>
        <div class="btn-group">
            <button class="apply-btn" onclick="location.href='apply.html'">Apply Now</button>
            <button class="remove-btn" onclick="this.parentElement.parentElement.remove()">Remove</button>
        </div>
    </div>

    <div class="job-card">
        <h3>Backend Developer</h3>
        <p>📍 Bengaluru | 💼 3+ years</p>
        <p>🛠 Skills: Node.js, Express, MongoDB</p>
        <div class="btn-group">
            <button class="apply-btn" onclick="location.href='apply.html'">Apply Now</button>
            <button class="remove-btn" onclick="this.parentElement.parentElement.remove()">Remove</button>
        </div>
    </div>

    <div class="job-card">
        <h3>Software Engineer</h3>
        <p>📍 Pune | 💼 1-3 years</p>
        <p>🛠 Skills: Java, Spring Boot, MySQL</p>
        <div class="btn-group">
            <button class="apply-btn" onclick="location.href='apply.html'">Apply Now</button>
            <button class="remove-btn" onclick="this.parentElement.parentElement.remove()">Remove</button>
        </div>
    </div>

</div>

</body>
</html>
