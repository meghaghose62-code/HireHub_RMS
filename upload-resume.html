<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HireHub - Upload Resume</title>
<style>
    * { margin:0; padding:0; font-family:Poppins,sans-serif; box-sizing:border-box; }
    body { background:#f5f6fa; }

    .navbar {
        background:#0a66c2;
        padding:15px 30px;
        color:white;
        display:flex;
        justify-content:space-between;
        align-items:center;
    }
    .navbar button {
        background:white; color:#0a66c2; border:none;
        padding:8px 16px; border-radius:6px; cursor:pointer; font-weight:600;
    }

    .container {
        max-width:600px;
        background:white;
        margin:30px auto;
        padding:25px;
        border-radius:8px;
        box-shadow:0 1px 4px rgba(0,0,0,0.1);
    }

    h3 { text-align:center; color:#0a66c2; margin-bottom:15px; }

    input[type="file"] {
        width:100%;
        padding:10px;
        border:1px solid #ccc;
        border-radius:6px;
        margin-top:8px;
    }

    button {
        width:100%;
        background:#0a66c2;
        border:none;
        color:white;
        padding:12px;
        border-radius:6px;
        margin-top:18px;
        font-size:16px;
        cursor:pointer;
    }

    button:hover { background:#084d94; }

    .note {
        font-size:14px;
        margin-top:8px;
        color:gray;
    }
</style>
</head>
<body>

<div class="navbar">
    <h2>Upload Resume</h2>
    <button onclick="location.href='dashboard.html'">Dashboard</button>
</div>

<div class="container">
    <h3>Upload / Update Your Resume</h3>

    <input type="file" id="resumeFile" accept=".pdf, .doc, .docx">

    <p class="note">Supported formats: PDF, DOC, DOCX (Max size 2MB)</p>

    <button onclick="uploadResume()">Upload Resume</button>
</div>

<script>
function uploadResume() {
    const file = document.getElementById("resumeFile").files[0];

    if (!file) {
        alert("⚠ Please select a resume to upload.");
        return;
    }

    const allowedExtensions = /(\.pdf|\.doc|\.docx)$/i;
    if (!allowedExtensions.exec(file.name)) {
        alert("❌ Invalid file type! Only PDF, DOC, DOCX allowed.");
        return;
    }

    if (file.size > 2 * 1024 * 1024) {
        alert("❌ File too large! Maximum size is 2MB.");
        return;
    }

    alert("✅ Resume uploaded successfully!");
    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
