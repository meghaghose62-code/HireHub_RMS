<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HireHub - Admin Dashboard</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:"Poppins", sans-serif; }

/* Background */
body {
    background: url('https://www.oleeo.com/wp-content/uploads/2024/07/Protecting-Candidate-Data.-Oleeos-Top-tips-to-Security-Compliance-and-Trust-1-1024x683.jpg') no-repeat center center/cover;
    height: 100vh;
    color: white;
    display: flex;
    flex-direction: column;
}

/* Navbar */
.navbar {
    background: rgba(10, 102, 194, 0.95);
    padding:15px 30px;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 6px rgba(0,0,0,0.2);
}
.navbar h2 { font-size:26px; font-weight:700; letter-spacing:1px; }
.navbar button {
    background:white;
    color:#0a66c2;
    border:none;
    padding:8px 16px;
    border-radius:6px;
    cursor:pointer;
    font-weight:600;
    transition:0.3s ease;
}
.navbar button:hover { background:#eaf2ff; }

/* Layout */
.container {
    display: grid;
    grid-template-columns: 250px 1fr;
    height: calc(100vh - 60px);
}

/* Sidebar */
.sidebar {
    background: linear-gradient(180deg, #081a3c 0%, #123274 100%);
    padding:25px 20px;
    box-shadow:2px 0 8px rgba(0,0,0,0.3);
}
.sidebar h3 { 
    margin-bottom:25px; 
    color:#FFD700; 
    font-size:20px; 
    font-weight:700; 
    text-shadow: 0 0 8px rgba(255,215,0,0.8);
}
.sidebar a {
    display:block;
    padding:14px 15px;
    color:#eaf1ff;
    text-decoration:none;
    margin-bottom:12px;
    border-radius:8px;
    background:rgba(255,255,255,0.1);
    font-weight:500;
    transition:all 0.3s ease;
}
.sidebar a:hover {
    background:#FFD700;
    color:#0a1f44;
    font-weight:600;
    transform:translateX(6px);
}

/* Main content area */
.content {
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:40px;
}

/* Text Box */
.text-box {
    background: rgba(0, 0, 0, 0.65);
    border-radius: 25px;
    padding: 70px 80px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.5);
    backdrop-filter: blur(12px);
    max-width: 850px;
}

/* Heading */
.text-box h1 {
    font-size: 60px;
    margin-bottom:20px;
    font-weight:800;
    color: #FFD700;
    text-shadow: 0 0 15px rgba(255, 215, 0, 0.9), 0 0 35px rgba(255, 215, 0, 0.6);
}

/* Subtext */
.text-box p {
    font-size:22px;
    line-height:1.6;
    margin-bottom:40px;
    color:#ffffff;
    text-shadow:0 0 8px rgba(0,0,0,0.6);
}

/* Stats */
.stats {
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:60px;
}
.stats div { text-align:center; }
.stats h3 {
    font-size:50px;
    margin-bottom:10px;
    color:#ffffff;
    font-weight:800;
    text-shadow:0 0 12px rgba(255,255,255,0.9);
}
.stats p { 
    font-size:20px; 
    color:#FFD700; 
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:1px;
}

/* Responsive */
@media(max-width:768px){
    .container { grid-template-columns: 1fr; }
    .text-box { padding:30px 20px; }
    .text-box h1 { font-size:40px; }
    .text-box p { font-size:18px; }
}
</style>
</head>
<body>

<div class="navbar">
    <h2>HireHub Admin Dashboard</h2>
    <button onclick="location.href='login.html'">Logout</button>
</div>

<div class="container">
    <div class="sidebar">
        <h3>Admin Menu</h3>
        <a href="job-approval.html">✔ Approve Job Posts</a>
        <a href="report-analysis.html">📈 Reports & Analytics</a>
        <a href="manage-users.html">👥 Manage Users</a>
        <a href="system-alerts.html">⚠ System Alerts</a>
    </div>

    <div class="content">
        <div class="text-box">
            <h1>Hello, Admin! </h1>
            <p>Lead your organization's hiring ecosystem with insights, approvals, and analytics—all from one powerful dashboard.</p>

            <div class="stats">
                <div>
                    <h3>320</h3>
                    <p>Active Users</p>
                </div>
                <div>
                    <h3>120</h3>
                    <p>Job Listings</p>
                </div>
                <div>
                    <h3>450</h3>
                    <p>Applications</p>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
